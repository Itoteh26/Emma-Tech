<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emma Tech Platform</title>
    <!-- React and ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
    <!-- Babel Browser Transformer -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin="anonymous"></script>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: rgb(59, 130, 246); border-radius: 4px; }
        ::-webkit-scrollbar-track { background: rgb(15, 23, 42); }
        ::selection { background-color: rgb(59, 130, 246); color: white; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
    <div id="root"></div>

    <!-- Main Application Code Container -->
    <script type="text/babel">
        const { 
          Menu, X, LogOut, BookOpen, Zap, Code, Shield, TrendingUp, 
          Play, Check, Lock, Sparkles, ArrowRight, Plus, Home, Users, 
          BarChart3, Settings, Clock, Star, Target, Layers, Terminal,
          ChevronRight, Search, Bell, User, ChevronDown
        } = lucide;

        const COURSES_LIBRARY = {
          python: {
            id: 'python-fundamentals',
            title: 'Python Fundamentals',
            description: 'Master Python programming from basics to advanced concepts',
            category: 'Coding',
            level: 'Beginner',
            progress: 45,
            modules: [
              { id: 'py-1', title: 'Variables & Data Types', lessons: 8, completed: 4 }
            ]
          },
          cybersecurity: {
            id: 'cybersec-101',
            title: 'Cybersecurity Fundamentals',
            description: 'Essential security concepts and threat analysis',
            category: 'Cybersecurity',
            level: 'Beginner',
            progress: 0,
            modules: [
              { id: 'cyber-1', title: 'Network Security Basics', lessons: 8, completed: 0 }
            ]
          }
        };

        const SAMPLE_LESSONS = {
          'py-1': {
            id: 'py-1-1',
            title: 'Introduction to Variables',
            content: "Understanding Variables in Python. A variable is a named container that stores a value in memory.",
            codeTemplate: "# Start coding here!\nname = \"Your Name\"\nprint(f\"Hello, {name}!\")"
          }
        };

        function EmmatechPlatform() {
          const [currentUser, setCurrentUser] = React.useState(null);
          const [currentPage, setCurrentPage] = React.useState('landing');
          const [enrolledCourses, setEnrolledCourses] = React.useState([]);

          const handleLogout = () => {
            setCurrentUser(null);
            setCurrentPage('landing');
          };

          const handleEnrollCourse = (courseId) => {
            if (!enrolledCourses.includes(courseId)) {
              setEnrolledCourses([...enrolledCourses, courseId]);
            }
          };

          // LANDING
          const LandingPage = () => (
            <div className="min-h-screen bg-gradient-to-br from-slate-950 via-blue-950 to-slate-950">
              <nav className="border-b border-blue-500/20 px-6 py-4 flex justify-between items-center">
                <div className="flex items-center gap-2">
                  <Sparkles className="text-blue-400" />
                  <span className="text-xl font-bold tracking-wider">EMMA TECH</span>
                </div>
                <button onClick={() => setCurrentPage('signup')} className="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white text-sm font-semibold rounded-lg transition">
                  Get Started
                </button>
              </nav>
              <div className="max-w-4xl mx-auto text-center py-24 px-4 space-y-6">
                <h1 className="text-5xl md:text-6xl font-extrabold leading-tight">
                  Master <span className="text-blue-400">Coding</span> & <span className="text-violet-400">Cybersecurity</span>
                </h1>
                <p className="text-slate-400 text-lg max-w-2xl mx-auto">
                  An interactive educational workspace designed to take you from foundational logic to real-world deployment.
                </p>
                <div className="pt-4">
                  <button onClick={() => setCurrentPage('signup')} className="px-8 py-4 bg-gradient-to-r from-blue-500 to-violet-500 rounded-lg font-bold shadow-lg shadow-blue-500/20 hover:scale-105 transition">
                    Explore Dashboard
                  </button>
                </div>
              </div>
            </div>
          );

          // SIGNUP
          const SignupPage = () => {
            const [email, setEmail] = React.useState('');
            const [name, setName] = React.useState('');
            const handleSubmit = (e) => {
              e.preventDefault();
              setCurrentUser({ email, name: name || 'Developer' });
              setCurrentPage('dashboard');
            };
            return (
              <div className="min-h-screen flex items-center justify-center bg-slate-950 px-4">
                <div className="w-full max-w-md bg-slate-900 border border-slate-800 p-8 rounded-xl space-y-6">
                  <div className="text-center">
                    <h2 className="text-2xl font-bold">Create Account</h2>
                    <p className="text-sm text-slate-400 mt-1">Access the Emma Tech training environment</p>
                  </div>
                  <form onSubmit={handleSubmit} className="space-y-4">
                    <div>
                      <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Username</label>
                      <input type="text" required value={name} onChange={e => setName(e.target.value)} className="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-lg text-white focus:border-blue-500 focus:outline-none" />
                    </div>
                    <div>
                      <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Email Address</label>
                      <input type="email" required value={email} onChange={e => setEmail(e.target.value)} className="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-lg text-white focus:border-blue-500 focus:outline-none" />
                    </div>
                    <button type="submit" className="w-full py-3 bg-blue-600 hover:bg-blue-500 font-bold rounded-lg transition">Sign Up</button>
                  </form>
                </div>
              </div>
            );
          };

          // DASHBOARD
          const DashboardPage = () => (
            <div className="min-h-screen bg-slate-950">
              <nav className="border-b border-slate-800 px-6 py-4 flex justify-between items-center bg-slate-900/50">
                <span className="font-bold text-blue-400">Emma Tech Workspace</span>
                <button onClick={handleLogout} className="text-sm text-red-400 font-medium">Logout</button>
              </nav>
              <div className="max-w-6xl mx-auto px-6 py-12 space-y-8">
                <div>
                  <h1 className="text-3xl font-bold">Welcome, {currentUser.name}!</h1>
                  <p className="text-slate-400 text-sm mt-1">Track your progress and active learning paths.</p>
                </div>
                <div className="grid md:grid-cols-2 gap-6">
                  {Object.values(COURSES_LIBRARY).map(course => (
                    <div key={course.id} className="p-6 bg-slate-900 border border-slate-800 rounded-xl space-y-4">
                      <div>
                        <span className="text-xs font-bold text-blue-400 uppercase">{course.category}</span>
                        <h3 className="text-xl font-bold mt-1">{course.title}</h3>
                      </div>
                      <p className="text-sm text-slate-400">{course.description}</p>
                      <button onClick={() => { handleEnrollCourse(course.id); setCurrentPage('tutorial'); }} className="w-full py-2 bg-slate-800 hover:bg-blue-600 rounded-lg text-sm font-semibold transition">
                        Launch Course
                      </button>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          );

          // TUTORIAL
          const TutorialPage = () => {
            const lesson = SAMPLE_LESSONS['py-1'];
            return (
              <div className="min-h-screen bg-slate-950 flex flex-col">
                <nav className="border-b border-slate-800 px-6 py-4 flex justify-between items-center bg-slate-900">
                  <button onClick={() => setCurrentPage('dashboard')} className="text-sm text-blue-400">&larr; Dashboard</button>
                  <span className="font-semibold text-sm">{lesson.title}</span>
                  <div className="w-4" />
                </nav>
                <div className="flex-1 flex flex-col lg:flex-row">
                  <div className="flex-1 p-8 overflow-y-auto space-y-4 border-b lg:border-b-0 lg:border-r border-slate-800">
                    <h2 className="text-2xl font-bold text-white">{lesson.title}</h2>
                    <p className="text-slate-300 leading-relaxed">{lesson.content}</p>
                    <button onClick={() => { alert('Module checkpoint saved successfully!'); setCurrentPage('dashboard'); }} className="px-6 py-3 bg-emerald-600 rounded-lg font-bold text-sm">Mark Complete</button>
                  </div>
                  <div className="flex-1 bg-slate-900 p-6 flex flex-col space-y-4">
                    <textarea defaultValue={lesson.codeTemplate} className="flex-1 bg-slate-950 border border-slate-800 rounded-lg p-4 font-mono text-sm text-slate-300 focus:outline-none focus:border-blue-500 resize-none" />
                    <button onClick={() => alert('Script executed successfully.')} className="w-full py-3 bg-blue-600 font-bold rounded-lg text-sm">Execute Script</button>
                  </div>
                </div>
              </div>
            );
          };

          if (!currentUser) {
            return currentPage === 'landing' ? <LandingPage /> : <SignupPage />;
          }
          return currentPage === 'dashboard' ? <DashboardPage /> : <TutorialPage />;
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<EmmatechPlatform />);
    </script>
</body>
</html>
